services:
  postgres:
    image: postgres:16-alpine
    container_name: une-haus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: unehaus
      POSTGRES_PASSWORD: unehaus_dev_password
      POSTGRES_DB: unehaus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unehaus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
