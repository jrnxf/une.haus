name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_IMAGES_EDITOR_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_EDITOR_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
  DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DATABASE_USER: ${{ secrets.DATABASE_USER }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  HAUS_AWS_ACCESS_KEY_ID: ${{ secrets.HAUS_AWS_ACCESS_KEY_ID }}
  HAUS_AWS_BUCKET_NAME: ${{ secrets.HAUS_AWS_BUCKET_NAME }}
  HAUS_AWS_REGION: ${{ secrets.HAUS_AWS_REGION }}
  HAUS_AWS_SECRET_ACCESS_KEY: ${{ secrets.HAUS_AWS_SECRET_ACCESS_KEY }}
  MUX_TOKEN_ID: ${{ secrets.MUX_TOKEN_ID }}
  MUX_TOKEN_SECRET: ${{ secrets.MUX_TOKEN_SECRET }}
  MUX_WEBHOOK_SECRET: ${{ secrets.MUX_WEBHOOK_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: lint
        run: bun run lint
      - name: format
        run: bunx oxfmt --check
      - name: typecheck
        run: bun run typecheck
      - name: unit tests
        run: bun run test:unit
      - name: integration tests
        if: github.event_name == 'push' || github.event.pull_request.draft == false
        run: bun run test:integration
